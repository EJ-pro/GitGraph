server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # React Router를 위한 설정: 파일이 없으면 index.html로 라우팅
        try_files $uri $uri/ /index.html;
    }

    # 프론트엔드 OAuth 콜백 페이지는 백엔드로 프록시하지 않고 index.html로 라우팅
    location = /auth/callback {
        try_files $uri $uri/ /index.html;
    }

    # API 및 인증 요청을 백엔드 컨테이너로 프록시
    location ~ ^/(api|auth|analyze|chat|projects|inquiries|stats|overview|status|generate|readmes|user) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) 스트리밍 필수 설정
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
